spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/construtora_saas?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:100MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:100MB}

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  security:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8081}
  storage:
    bucket: ${S3_BUCKET:construtora-files}
    region: ${S3_REGION:us-east-1}
    endpoint: ${S3_ENDPOINT:}
    public-base-url: ${S3_PUBLIC_BASE_URL:}
    public-read: ${S3_PUBLIC_READ:false}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    force-path-style: ${S3_FORCE_PATH_STYLE:true}
  ai:
    monthly-question-limit: ${AI_MONTHLY_QUESTION_LIMIT:300}
    context-cache-ttl-seconds: ${AI_CONTEXT_CACHE_TTL_SECONDS:90}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-5.4}
      max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:1000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
