version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: construtora_test_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: construtora_saas_test
    ports:
      - "13307:3306"
    volumes:
      - mysql_data_test:/var/lib/mysql

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: construtora_test_backend
    restart: unless-stopped
    depends_on:
      - mysql
      - minio
    environment:
      DB_URL: jdbc:mysql://mysql:3306/construtora_saas_test?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: dGVzdGUtc3VwZXItc2VndXJlLWtleS13aXRoLW1vcmUtdGhhbi0zMi1jaGFycw==
      JWT_EXPIRATION_MINUTES: 120
      ALLOWED_ORIGINS: http://localhost:18081
      S3_BUCKET: construtora-files-test
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_BASE_URL: http://localhost:19000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: true
      S3_PUBLIC_READ: true
    ports:
      - "18080:8080"

  frontend:
    image: node:20-alpine
    container_name: construtora_test_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:18080
      VITE_AI_ASSISTANT_MODE: sales
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "18081:5173"

  minio:
    image: minio/minio:latest
    container_name: construtora_test_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data_test:/data

volumes:
  mysql_data_test:
  minio_data_test:
